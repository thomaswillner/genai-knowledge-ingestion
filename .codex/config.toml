# Project-scoped Codex MCP configuration.
# Reference: https://developers.openai.com/codex/mcp/

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.gkiDevTools]
command = "python"
args = ["-m", "gki_dev_tools.mcp_server"]
cwd = "."
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true
required = false

[mcp_servers.gkiDevTools.env]
GKI_PROJECT_ROOT = "."
GKI_STATE_DIR = ".gki/state"
GKI_LEDGER_DIR = ".gki/ledgers"
GKI_LOG_DIR = ".gki/logs"
GKI_TIKA_URL = "http://127.0.0.1:9998"
